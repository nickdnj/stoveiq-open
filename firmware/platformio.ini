; StoveIQ Open Source — PlatformIO Configuration
;
; Environments:
;   esp32s3  — Real ESP32-S3 hardware with MLX90640
;   emulator — Native desktop with thermal scene emulator
;
; SPDX-License-Identifier: MIT

[platformio]
default_envs = esp32s3

; ---------------------------------------------------------------------------
; Shared settings
; ---------------------------------------------------------------------------
[common]
build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter
    -I include
    -I emulator
src_filter = +<src/*>

; ---------------------------------------------------------------------------
; ESP32-S3 target (real hardware)
; ---------------------------------------------------------------------------
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_build.partitions = partitions.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults
build_flags =
    ${common.build_flags}
    -DCONFIG_STOVEIQ_TARGET_ESP32=1
monitor_speed = 115200
test_framework = unity
board_build.flash_mode = dio
board_build.f_flash = 80000000L

; ---------------------------------------------------------------------------
; Native / Emulator target (desktop build for tests and simulation)
; ---------------------------------------------------------------------------
[env:emulator]
platform = native
build_flags =
    ${common.build_flags}
    -DCONFIG_STOVEIQ_USE_EMULATOR=1
    -lm
    -lpthread
build_src_filter =
    +<src/sensor.c>
    +<src/cooking_engine.c>
    +<src/tasks.c>
    +<src/ble_provision.c>
    +<src/main.c>
    +<../emulator/thermal_emulator.c>
    +<../emulator/scenarios/*.c>
test_framework = unity
test_build_src = yes
